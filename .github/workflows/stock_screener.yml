name: Еженедельный скрининг акций

on:
  schedule:
    - cron: '30 19 * * 1,3,5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read          # Чтение кода репозитория (для checkout)
      # Если вы не пишете в репозиторий, write не нужен
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0       # Полная история (если нужно)
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Установка зависимостей
        run: pip install yfinance pandas numpy requests beautifulsoup4
      - name: Запуск анализа
        run: python stock_analyzer.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

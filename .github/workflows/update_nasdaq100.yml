name: Update NASDAQ 100 List

on:
  schedule:
    - cron: '30 19 * * 1,3,5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pandas yfinance
      - name: Generate nasdaq100.csv
        run: python update_nasdaq100.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config.user.email "github-actions[bot]@users.noreply.github.com"
          git add nasdaq100.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Automatically update NASDAQ 100 list"
          git push

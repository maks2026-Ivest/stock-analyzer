name: Обновление списков акций

on:
  schedule:
    - cron: '0 0 1 * *'   # 1-го числа каждого месяца
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Установка зависимостей
        run: pip install pandas
      - name: Генерация CSV-файлов
        run: python fetch_tickers.py
      - name: Коммит и пуш обновлённых файлов
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add us_tickers.csv stoxx600_full.csv
          git commit -m "Автоматическое обновление списков тикеров" || echo "Нет изменений"
          git push

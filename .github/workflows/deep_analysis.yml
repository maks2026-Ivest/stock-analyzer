name: Глубокий анализ компании

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Тикер компании (например, ADBE, PYPL, NVDA)'
        required: true
        type: string

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Установка зависимостей
        run: |
          pip install yfinance pandas numpy requests beautifulsoup4
      - name: Запуск глубокого анализа
        run: python deep_analysis.py ${{ github.event.inputs.ticker }}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
